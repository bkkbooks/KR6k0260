body:
  text: 福州鼓山嗣祖沙門元賢述資具佛因見諸比丘在道行皆大擔衣思欲立制時初夜在露地坐著一衣至中夜覺寒乃著二衣至後夜又覺寒乃著三衣因作是念當來比丘聽畜三衣足以遮寒不許過畜又佛一日出王舍城南遊至迦葉窟前見水田畦畔整齊顧謂阿難曰三世如來衣相如是乃命阿難教比丘作此衣云須知此是長條此是短條此是葉此是縫此是第一縫此是第二縫此是中縫此條葉兩向衣條相必等田畦者譬此衣生諸功德亦能為世福田也用刀割截而成者不為怨賊所劫也聽作安陀會長四肘廣二肘聽作多羅僧僧伽黎長五肘廣三肘肘量不定佛言當隨身分量葉極廣四指極狹如穬麥要須却刺前去或作馬齒縫或作鳥足縫免灰塵入內其有不縫合處謂之明孔象田畦出水之竇也緣四指施鈎後八指施紐三衣破但緣不斷不失受持若壞隨孔大小方圓補及如二指大若不持三衣入聚落犯突吉羅入俗人處不著紐者家家突吉羅衣若下壞得倒著上下安鈎紐在道行為護惜衣葉聽背著入聚落乃正著比丘所在之處衣鉢常隨如鳥兩翼如見佛禮佛問訊二師入衆等時應偏袒右肩若請齊坐禪誦經入聚落應覆兩肩現福田相三衣總名袈裟袈裟本是草名可以染衣因將彼草目此衣號諸師翻有多種皆是義翻非正翻也其體用布為之獸毛蠶口非所應也其色用三種壞色五大上色非所應也若以捨墮衣及邪命得衣作不成受大衣限五日成七衣限四日成五衣限二日成過者尼犯波逸提比丘犯突吉羅若成衣不受持者突吉羅經云袈裟乃聖賢標幟隨順寂滅行慈悲心未得沙門行應起八法信重袈裟一應起塔想二應起寂滅想三應起慈想四應起悲想五應起如佛想六應起慚想七應起愧想八應起令我來世離三毒具沙門行想悲華經云佛于寶藏佛前發願願我成佛時袈裟有五種功德一入我法中犯重邪見于一念中敬心尊重必于三乘授記二天龍人鬼若能敬此袈裟少分即得三乘不退三若有鬼神諸人得袈裟乃至四寸飲食充足四若衆生共相違背念袈裟力尋生慈心五若持袈裟少分尊重恭敬常得勝他大悲經云但能性是沙門汙沙門行形是沙門披著袈裟者於彌勒佛至樓至佛所得入涅槃無有遺餘論釋云受禁戒是沙門性剃髮染衣是沙門形海龍王經龍王白佛言如此海中無數種龍有四金翅鳥常來取食願佛擁護令得安樂佛脫身上所著皂衣告龍王曰汝取是衣分與諸龍皆令周遍於中有得一縷者金翅鳥王不能觸犯持禁戒者所願必得永明壽禪師云昔蓮花色比丘尼曾為戲人以披袈裟作戲承此功德今遇釋迦牟尼佛獲羅漢果無有誠心尚獲四果何況至誠律云有四事到他國不著袈裟無罪一者無塔寺二者無比丘僧三者有盜賊四者國王不好道安陀會一名安怛羅婆沙此云中宿衣亦云作務衣長四肘廣二肘五條一長一短得割截作貼葉作亦得褶葉及縵作新者一重故者二重正衣有四種謂割截貼葉褶縵也從衣有二十二種謂割截貼葉二種上下增減不同也凡作務勞役路途往反及睡時當搭此衣正缺開將上二衣作從受法云大德一心念我比丘某甲此安陀會五條衣受一長一短割截衣持三說若是貼葉褶葉則改割截二字捨法云大德一心念我比丘某甲此安陀會是我三衣數先受持今捨一說上二衣倣此可知若獨住比丘三衣中有換易者具威儀手執衣心念口言云我比丘某甲此安陀會五條衣今捨三說受亦如前心念口言云我比丘某甲此安陀會五條衣今受三說餘二衣倣此可知若縵作者受不言條相但云此縵安陀會今受持捨但云此縵安陀會今捨餘詞竝同從衣捨受可知多羅僧一名嗢怛羅僧伽此云上著衣亦云入衆衣長五肘廣三肘七條得割截作貼葉作新者一重故者兩重正衣有二種謂割截貼葉也從衣有二十二種亦是割截貼葉上下增減不同也凡聽講修懺禮佛坐禪布薩自恣一切入衆當搭此衣如缺開將上下二衣作從受捨法同前僧伽黎一名僧迦胝此云重復衣又云雜碎衣長五肘廣三肘當比七衣加四寸九條十一條十三條各二長一短名下品十五條十七條十九條各三長一短名中品二十一條二十三條二十五條各四長一短名上品新者二重故者四重正衣有十八種謂割截貼葉各九種也從衣有六種謂七條有二種五條有四種也凡入王宮入聚落應供說法禮三寶禮和尚阿闍黎當搭此衣正缺開將下二衣作從受捨同前佛言有五事得留僧伽黎一有疑恐怖處二有雨三疑有雨四作僧伽黎未成五浣染縵安陀會上下二衣一云縵條言縵者止是一幅不割截無水田相也此乃式叉摩那沙彌沙彌尼所受衣也上衣量同七衣准七衣用下衣量同五衣准五衣用受捨法同前但稱式叉摩那等三名為異耳近日叢林中絶不識有此衣乃以大僧三衣直付沙彌其誤甚矣僧祗支一名僧却崎一名僧迦鵄此翻掩腋衣律云時比丘尼露胸膊而行居士見之譏嫌白佛佛制作僧祗支覆肩衣故尼受戒時付三衣之外加付此二衣式叉摩那沙彌尼亦得受祗支長二肘廣四肘用覆左肩右開左合受法云大姊一心念我比丘尼某甲此僧祇支如法作今受持三說捨云大姊一心念我比丘尼某甲此僧祗支是我五衣數先受持今捨一說式叉摩那沙彌尼受捨法亦同但改名為異耳覆肩衣或云即瞿修羅十三資具中名副祗支此衣與祗支不可竝著著祗支則不著此長廣未詳受捨法亦倣祇支偏衫非是佛制因魏時請僧入內自恣宮人見僧露臂不以為善遂作衣施因綴于左邊祗支上因而受稱偏衫是祗支在左肩偏衫在右肩後人合之總名偏衫也尼師壇此云坐具昔佛一日巡行諸寮見臥具多為不淨所污乃制坐具為障身障衣障臥具也初制長四尺廣三尺後因迦留陀夷身量大見佛來故以手挽尼師壇佛問何故答言欲令大耳佛乃更增半磔手今當隨身之量可加則加新者二重故者四重不得單作不得雜用不得淨施不得離宿離宿得突吉羅罪不須捨佛制作新具用舊具揲新具上若無舊具則已佛初制袈裟角在左臂坐具在袈裟下後年少比丘儀容端美入城乞食多為女愛由是制衣角在左肩後衣角為風飄動聽以尼師壇鎮之後外道達磨多問比丘肩上片布持將何用答云擬將坐之達磨多云此衣既可貴有大威靈豈得以所坐之布而居其上比丘無以對白佛佛乃制還以衣角居左臂坐具在衣下但不得垂尖角如象鼻羊耳等相受法云大德一心念我比丘某甲此尼師壇應量作今受持鉢多羅此云應量器即常用食器也出家在家九十六種盡皆有鉢但俗人多用雜寶銅鑞木石等鉢且其制自殊今釋子所用惟有鐵瓦二種其式乃世尊自作坯燒成非一切人之所可共乃恆沙諸佛之標幟也其量四分云上鉢一斗下鉢五升恐今人不能受持十誦云受秦三升毗尼母云下鉢升半若過三升不成受持以此觀之十誦之說為當其色合熏作黑色赤色又云鳩鴿色孔色不可作雜用當敬之如目比丘下鉢即是尼僧上鉢五衆皆共受持受法云大德一心念我比丘某甲此鉢多羅應量受常用故三說下四衆受法亦准此若無人時獨受鉢即具威儀手執鉢心念口言我比丘某甲此鉢多羅應量受常用故捨准上可知迦絺那衣此云功德衣亦云慶賞衣謂前安居人坐夏已滿功德勝故以此慶賞之乃七月十六日受也後安居人不得又云迦提者此云昴星以昴星值此月以此月得衣故名迦提也受此衣時有五利謂得畜長財離衣宿受別請別衆食食前食後至他家也受此衣至十二月十五日即捨與沙彌等復受三衣此衣四周有緣五條條作十隔亦現田相若得新衣若檀越施衣若糞掃衣非死人者新物揲作淨若已浣浣已納作淨即日來不經宿不以邪命得方可受持受時捨時俱當鳴鐘集僧羯磨具出自恣篇五納衣用五種衣納成一有施主衣二無施主衣三往還衣四死人衣五糞掃衣無施主衣謂道傍棄衣河邊棄衣蟻穿破衣等往還衣謂天竺人亡眷屬以衣贈送至林中却取還施僧也餘可知十誦云納衣有十利一在粗衣數二少所求索三隨意可坐四隨意可臥五浣洗易六少蟲七易染八難壞九更不餘衣十不失求道納衣成不論重數多少不用淨施但納成亦須現田相不現田相者不許穿入聚落糞掃衣凡十種謂牛嚼衣鼠咬衣火燒衣月水衣産婦衣神廟衣為風吹鳥銜至他處者冢間衣求願衣王受職衣往還衣十種取來浣染過用雨浴衣因毗舍尼母請佛齊日令婢來唱時到適天大雨佛命僧衆就雨中浴婢見謂是裸形外道歸白母母令再請佛與衆僧俱來赴齊食畢母請施雨浴衣佛因制長六搩手廣二搩手半覆瘡衣初以粗布作舉起瘡痛佛令用極細布為之長四搩手廣二搩手涅槃僧或云泥縛些那或云泥伐散那狀略似此方之裙無有帶襻上將及心下乃至踝著時集衣為褶束之以帶其帶大三指繞腰可三匝云舍勒譯云內衣即小涅槃僧也作務及睡時著之漉水囊護生行慈之要物也故在六物之數凡為僧者不可旦夕離身其底用緻練其匡用鐵初漉時須深諦視還放時切忌損傷大行由此而生切莫輕為小物錫杖一名智杖一名德杖乃聖賢之標幟也三錞念三途三災三界之苦四鈷用斷四生通中高五尺用斷五道輪回十二環念十二因緣三錞四鈷合數成七念七覺意通鑽成八念八正道除八難上分用錫中分用木下分用牙角如法持之現得威儀助後得果速成正覺日用軌則教鉢法上堂欲把鉢時先須淨手於巾上拭手令乾中指夾巾待斂鐘聲即如法夾巾把鉢念偈云執持應器當願衆生成就法器受人天供唵枳哩枳哩嚩日囉吽癹吒把鉢當用兩手捧下令匙柄向身把鉢不得太高不得太低以當胸為度至所坐處先放巾次放鉢碗鉢常須離膝巾不得安手置膝上不得傾鉢中餘瀝滴牀前展鉢念偈云如來應量器我今得敷展願共一切衆等三輪空寂唵斯麻摩尼娑訶凡所受食須令碗鉢離床念供養時右手大拇指捻無名指左手持鉢齊眉供文如常出生念云法力不思議慈悲無障礙七粒遍十方普施周沙界唵度利益娑訶侍者送食念云汝等鬼神衆我今施汝供此食遍十方一切鬼神共唵穆力稜莎訶鳴指三下午齊同此不必別念偈呪回唱僧跋云佛制比丘食存五觀散心雜話信施難消大衆聞磬聲各正念侍者鳴磬一聲作五觀想一計工多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道故方受此食初舉匙願斷一切惡二匙願修一切善三匙願所修善根回向衆生普成佛道凡一口之飯須匙頭一抄食令匙頭直入口口不得大張不得手安置食巾上而食不得用匙筯刮鉢碗作聲若有食遺落巾上不得取食當收聚安一處待付與淨人鉢碗中若有餘殘不得將歸房內結齊念凖提呪或消災呪畢念云所謂布施者必獲其利益若為樂布施後必得安樂次念飯食已訖如常受䞋念心經畢偈云財法二施等無差別檀波羅蜜具足圓滿出堂先舉門頰邊腳當令匙柄向身執鉢當胸不得顧視出堂門外須旁廊一邊行先入堂亦然歸房須先以水浸鉢當用一大合水于碗中浸皂角可長二寸鉢牀若短當讓上座不得亂安著欲洗鉢先須收攬衣服勿令著地洗鉢先用清水一遍次用碗中皂角汁瀉用其鉢盂外上二分為淨下一分為觸凡把鉢滌蕩瀉水不得高當須曲腰低頭瀉水令鉢去地一側手用湯蕩取即不損鉢光若損鉢光鉢即受膩難洗洗鉢去地七寸洗之莫使有聲三易水欲棄水不得灑地棄洗鉢水念偈云我以洗鉢水如天甘露漿施與諸鬼神悉令獲飽滿唵摩休囉悉娑訶又有七事一鉢中有餘飯不得便取棄之二欲棄鉢中飯當著淨地三當用澡豆若草葉四澡鉢不得於淨地當人道中五澡鉢當使下有枝六當更淨水不得遠棄汙濺人七欲棄鉢中水當去地四寸不得使有高下拭鉢五事一當更澡手拭令燥二當持淨手巾著膝上三當拭裏使燥四已拭表不得復拭裏五鉢已燥即當持淨手巾并覆著囊若未燥當俟燥如有急事當行可著日中若向火令燥分衛應器常在左脅帶應器之儀出時當以外向得食來還當以內向所食便當呪願若請飯時不得大撓刮鉢中不得筯叩案上不得以食私所與若摘與狗有來益食者不得言不用若已飽當以手却之樹下飯時不得水取淨草熟拭鉢出行時擕鉢隨身須鉢口向外不得挂鉢于杖頭道中值師當持鉢著淨地作禮如事說取師鉢并持隨師後去持錫杖法出錫時從沙彌邊受得即念偈曰執持錫杖當願衆生設大施會示如實道唵那㗚𠾱那㗚𠾱吒鉢底那㗚帝娜夜鉢儜吽癹吒行時著左脅下以小指拘之使兩頭平正不令高下住時僧著左足上尼著右足上不得著地若乞食近至三家遠滿七家若不得更不容多過若過非行者法若限內得食持杖掛樹上勿令著地若無樹著地平處不令傾側眠時杖與身相順置之牀後正與身齊不令前却行路止息時頭當向日勿令倒逆違背持杖有十一事一為地有蟲故二為年朽老故三為分越故四不得手持而前却五不得擔杖著肩上六不得橫著肩上垂兩頭七出入見佛像不聽有聲八持杖不得入衆九不得妄持至舍後十不得持杖過中出十一不得將杖指人畫地作字有四事過中得出一遠請行宿二至病患家三送過世者四外道請復有五事一三師俱出不得持杖自隨二四人共行除上座不得普持三到檀越門好正威儀四入檀越門三抖擻三反不出從至餘家五乞食出應持杖著左肘中央復有五事一杖常在己房不得離身二不聽下頭著地三不聽杖許生衣四日日須好磨拭五杖欲出時當從沙彌邊受若無沙彌淨人亦得下單念偈曰從朝寅旦直至暮一切衆生自回互若于足下喪形軀願汝一時生淨土唵逸帝律耶娑婆訶行路不傷蟲念偈曰若舉于足當願衆生出生死海具衆善法唵地利日利娑婆訶嚼楊枝念偈曰嚼楊枝時當願衆生其心調淨噬諸煩惱唵阿暮伽彌摩𨽻爾嚩迦囉僧輸䭾禰鉢頭摩俱麼囉爾嚩僧輸陀耶陀囉陀囉素彌麼𠼐娑嚩訶洗面時念偈曰以水洗面當願衆生得淨法門永無垢染唵㘕娑訶剃髮念偈曰剃除鬚髮當願衆生永離煩惱究竟寂滅唵悉殿都漫多囉跋阤耶娑訶飲水念偈曰佛觀一鉢水八萬四千蟲若不持此呪如食衆生肉唵嚩悉波羅摩尼娑婆訶沐浴念偈曰洗浴身體當願衆生心身無垢內外光潔唵跋折囉惱迦吒娑婆訶繞塔念偈曰右繞于塔當願衆生所行無逆成一切智南無三滿多沒䭾喃杜波杜波娑婆訶登廁鳴指三下念偈曰大小便時當願衆生棄貪嗔癡蠲除罪法唵狠魯陀耶娑婆訶洗淨念偈曰事訖就水當願衆生出世法中速疾而往唵賀曩密栗帝娑婆訶洗手念偈曰以水盥掌當願衆生得清淨手受持佛法唵主迦囉耶娑訶去穢念呪曰洗滌形穢當願衆生清淨調柔畢竟無垢唵室利曳娑䤈娑訶搭五衣念偈曰善哉解脫服無上福田衣我今頂戴受世世不捨離唵悉陀耶娑婆訶搭七衣念偈曰善哉解脫服無上福田衣我今頂戴受世世常得披唵度波度波娑婆訶搭大衣念偈曰善哉解脫服無上福田衣奉持如來命廣度諸衆生唵摩訶迦波波吒悉帝娑訶展坐具念偈曰坐具尼師壇長養心苗性展開登聖地奉持如來命唵檀波檀波娑訶登道場念偈曰若得見佛當願衆生得無礙眼見一切佛唵阿密栗帝吽癹吒臨睡時念偈曰以息𥨊時當願衆生身得安樂心無動亂觀想阿字輪一氣持二十一遍右脅而臥此篇偈呪本非律中所有但今律肆中率學之故載以備用受戒辨誤戒律之學自大智之後鮮得其人率皆迷謬相承莫知其非蓋數百年如斯矣今為略出數條以訂其誤普告同學願依佛制沙彌付三衣誤律中沙彌止服縵安陀會薩婆多云應持上下二衣上衣當多羅僧下衣當安陀會南山隨機羯磨中亦有沙彌受縵安陀會法根本百一羯磨云求寂之徒縵條是服輒披五條誠為非法今此土師家多付五衣不知起于何時若據根本所云五條亦所不許多三衣乎近日受戒者乃直以三衣頓付沙彌大違佛制非所應也比丘四人以上同羯磨誤律中受比丘戒初止一人受後為八難事起及餘因緣乃許三人同受十誦律云不得一時唱說令四人得受大戒根本雜事云不得四人同受近圓何以故非衆為衆而作羯磨理相違故五分律云一切不得羯磨四人後代諸師不問多寡人數竝一壇羯磨其弊起于南北二戒壇以人多故遂一壇受之然戒壇科儀止稱三人亦可知四人以上之非儀也尼同比丘受戒誤律中比丘尼戒與比丘不同其受戒所問遮難亦全不同蓋以男女事異也近年師家說戒乃以尼混入比丘中同受是以女而受男戒也壇既混亂非獨尼不得戒并諸比丘俱不得戒矣思之造衣非量誤律制安陀會長四肘廣二肘多羅僧長五肘廣三肘僧伽黎亦然近代師家作小五衣不知何人作俑杜撰甚矣又有作五衣量與七衣同者亦非佛制至于七衣大衣多作長六肘既多一肘不可搭乃折在左臂上豫嘗問其故則曰釋子圓頂方袍長五肘則不方也不知方袍二字本非佛說何苦執定況即作五肘又何不可名為方乎俗習相傳曾不自考可勝嘆哉輕棄亡僧衣誤律制亡僧衣鉢不許亡僧自授亡後佛許與看病人若看病人已有可衆中白二羯磨分散但衣須從人受過方可披搭也近日師家多謂亡僧衣不可搭乃教懸之樹上任其爛壞大與律違況佛謂衣雖極破不可搭亦不可輕棄乃至為燈炷亦能為施者增福今任其爛壞可乎居士付衣誤居士受五戒不必搭衣若受梵網戒及入道場時許搭衣但不割截單縫所成非却夾所成如大僧衣也故佛曰此衣一名三衣亦名俗服豈可付以大僧衣乎縱造單縫衣受持亦難如法妻子同宿則此衣置之何地越法之罪與日俱積則不若不持之為愈也故慈雲辨之于前雲棲禁之于後豈無識哉不受學戒誤佛制沙彌尼欲進具戒必先受二年式叉摩那戒使其學大尼律儀然後進具故受大尼戒時問遮難畢更問云汝二年學戒否答已學又問學戒清淨否答清淨復向諸尼亦如是問諸尼亦如是答是不受式叉戒則不得大尼戒也今全不受此戒且有言式叉摩那是戴髮女者迷謬相承其陋至此真可痛也妄改科文誤受戒之法諸部中俱有明文昭慶戒壇本已屬後人增飾非大智照師之舊如問遮難有兩錯三羯磨中有三錯識者難以依用近日有師自恃聰明全不知律又妄以己意更改將三衣先付與白衣習學不知出自何律至于臨壇多增唱誦悅人觀聽宛類應赴之儔豈是弘律之則若肯閲律一遍亦當自知其醜也混亂登壇誤凡受戒者先請十師請畢十師登壇乃作白差教授師教授師下壇在眼見耳不聞處問遮難問畢乃上壇白諸師白已始召戒子上壇此古規也昭慶戒科亦如是近年諸師將戒子俱集一壇請十師問遮難及羯磨受戒止在一處但將科文從頭念過一遍既非佛制亦非昭慶舊式不知成何軌則混亂壇法莫此為甚智者當自考之律家法數戒有二種一性戒謂其事性本是惡昔來皆禁如殺盜淫妄四戒是也二遮戒謂其事非惡昔來未禁佛出世始禁如飲酒一戒是也羯磨二意一成善如結界受戒等是也二治罪如懺悔及調伏永擯皆是也軍遲二用一淨用瓷瓦二觸用銅鐵頭陀二時正月十五至三月十五八月十五至十月十五此二時中常行頭陀羯磨三種一單白羯磨謂單白一遍者二白二羯磨謂白一遍又羯磨一遍者三白四羯磨謂白一遍又羯磨三遍者此三種具一切羯磨羯磨三法一人獨居但心念口言三人以下同居對首同白四人以上同居集衆羯磨律有三名一毗尼此云善制亦云滅二波羅提木叉此云保解脫亦云別解脫三尸羅此云戒持戒三心一厭諸有為二求趣菩提三悲愍有情夏臘三座一無夏至九夏名下座二十夏至十九夏名中座三二十夏至四十夏名上座五十夏已去名耆宿一切沙門之所恭敬食離三過一上味起貪二中味起嗔三下味起癡故必防心離過明相出有三一日初照閻浮提樹身天作黑色二日照樹葉天作青色三日照過樹天作白色律中言明相出者取白色為正安居離三過一無事遊行妨修道業二損傷物命違慈實深三所為既非故招世謗浴佛錢分三分一分佛中用一分法中用一分僧中用餘處不許用四種和尚一有法有衣食二有法無衣食三無法有衣食四無法無衣食前二種可依後二種不可依四不可附寄一老人二遠處惡人四大力四利須食一資身為道二養身中蟲三生施者福四破餓外道四種常住一常住常住謂衆僧厨庫寺舍衆具花果樹林田園僕畜但得受用不許分賣二十方常住謂僧家供僧常食體通十方唯局本處三現前現前謂僧得施物唯施此處現前僧故四十方現前謂五衆既亡所有輕物應分散未羯磨時十方僧到者皆得分已羯磨後十方僧到者不得分四種邪命食一方口食謂曲媚豪勢通使四方二維口食謂種種呪術卜算吉凶三仰口食謂仰觀星宿以自活命四下口食謂種植田園和合湯藥毗尼四義一是佛法中平地萬善由之以生二一切佛弟子皆依戒住一切衆生依戒而有三是趣涅槃之初門四是佛法瓔珞能莊嚴法身故尸羅四義一清涼義離心熱惱故二安隱義能為他世樂因故三安靜義能建立止觀故四寂滅義得涅槃樂因故頭陀四食一乞食二不作餘食法三一坐食四摶食一器盛頭陀四位一衣謂衲衣三衣二食謂乞食一坐食等三處謂蘭若冢間樹下四常謂常坐此無次第乞食四意一福利群生二折伏憍慢三知身有苦四除去滯著乞食四分一奉同梵行者二與窮乞人三與諸神鬼四自食五邪命一為利養故現奇特相二為利養故自說功德三卜相吉凶為人說法四高聲現威令人畏敬五說得供養以動人心懺悔五法一偏袒右肩二右膝著地三至心合掌四頭面禮足五口說罪名五處供養一父二母三親教師四軌範師五病人佛言比丘盡心盡壽供養父母又云我聽五處縱極破戒亦應供養五不應遊一官家二酒肆三屠兒家四淫女家五旃荼羅家五種闍黎一出家闍黎二羯磨闍黎三教授闍黎四受經闍黎五依止闍黎五種水羅一方羅用絹二尺或三尺隨時大小作二法瓶即陰陽瓶也三軍遲以絹繫口繩懸水中待滿引出四酌水羅但取密絹方一搭手或繫瓶口五衣角羅或鉢中濾水五種淨地一起心謂初造寺時定基已一比丘應起心於此寺可一房為僧作淨厨二共印持謂定基時一比丘告衆比丘言今諸具壽用心印定於此寺可一房為僧作淨厨三如牛臥謂寺中房舍猶如牛臥房門無有定所縱元不作法此處亦可作淨厨四故廢處謂經久僧舍廢處如重來者至舊觸處即淨也五秉法作謂衆定某處秉白二羯磨結淨厨界也比丘五德一怖魔二乞士三淨戒四淨命五破惡持齊五福佛言一日持齊有六十萬歲糧復有五福一少病二身安三少淫四少睡五生天知宿命經中凡言齊者非止不食肉不飲酒不食五辛更當過午不食及息諸惡業也入衆五法一須慈敬尊重于人二應自卑下如拭塵巾三知坐起俯仰得時四在彼僧中不為雜語五不可忍事亦應默然食果五種淨一火淨二刀淨三瘡淨四鳥啄淨五不中種淨此五種淨應食是中刀淨瘡淨鳥啄淨應去子食火淨不中種淨都食復有五種淨若皮剝落若㓟皮若腐若破若瘀燥睡眠五過一惡夢二諸天不護三心不入法四不思明相五喜出精嚼楊枝五利一口滋味二除熱三除風四消食五明目不嚼楊枝五過一口氣臭二不別味三癊不消四不引食五眼不明食辛五失一生過二天遠三鬼近四福消五魔集入俗舍五法一入門小語二攝身口意三卑躬四善護諸根五威儀詳序令人生喜受菩薩戒獲五種利一者十方佛愍念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿午後不食得五種福一少淫二少睡三得一心四無下風五身安少病大比丘五事故經營一報佛恩二長養佛法三滅凡劣衆自貢高四將來弟子折伏憍豪五發啓將來福業優婆塞五不應作一販賣畜生二販賣弓箭刀仗等三沽酒四壓油五大色染業外國壓油染色俱大傷物命故不應作僧伽六和戒和同修見和同解身和同住利和同均口和無諍意和同悅比丘六物一僧伽胝此云復衣二嗢呾囉僧伽此云上衣三安呾婆娑此云內衣四波嗢囉此云鉢五尼師但那此云坐具六鉢里羅囉伐拏此云濾水羅比丘以此六物隨身不可暫離持律七功德一能持佛內藏二能善斷諍三持戒四外道頂住以律故五不咨他於衆說法無畏故六能斷有疑故七能令正法久住故八事法滅相一好樂衣服二縱逸嬉戲三奴為比丘四婢為比丘尼五不樂不淨觀六毀謗毗尼七袈裟變白不受染色八貪用三寶物此八事近日僧尼已犯其七惟袈裟未變白也不亦危乎九淨肉一不為己殺二不見殺三不聞殺四不疑為己殺五自死六鳥殘七生乾八不期遇九前已殺乞食十利一自用活命自偶不屬他二施我者命住三寶然後當食三長生悲心四隨順佛教五易滿易養六破憍慢法七無見頂善根八見我乞食餘者效我九不與男女大小有諸事故十次第乞生平等心乞食十法一為攝受諸有情二次第三不疲厭四知足五為分布六不耽嗜七知量八為善品現前九為善根圓滿十為離我執粥有十利一色二力三壽四樂五詞清六辨七宿食消八風除九止饑十消渴飲酒十過一顏色惡二下劣三目視不明四現嗔恚相五壞田業資生六致疾病七益鬪訟八惡名流布九智慧減少十死墮惡道不殺得十種功德一於一切衆生得無所畏二於衆生得大慈心三斷惡習業四少病五長命六非人所護七無惡夢八無怨九不畏惡道十命終生善道十三資具一僧伽胝即大衣二嗢呾囉僧伽即七衣三安呾婆娑即五衣四尼師但那即坐具五裙六副裙七僧却崎即掩腋衣八副却崎即瞿修羅九拭身巾十拭面巾十一剃髮衣十二覆瘡衣十三藥資具衣食肉有十三種過一無始衆生皆我父母二衆生與己軀命無別三傷損慈心四增長殺業五增長債業六增長羅剎習氣七長積穢濁八誦經禮佛俱無功德九學持呪印俱不成就十天神日遠十一惡鬼日親十二畜生見之驚怖十三死墮惡道奪比丘三十五事比丘犯粗惡罪作訶責羯磨竟奪三十五事不應作一不應授大戒二不應受人依止三不應畜沙彌四不應受僧差教授比丘尼五僧差教授不應作六不應說戒七僧中問毗尼義不應答八僧差作羯磨不應作九僧中簡集智慧者共評論事不得在列十僧差作信命不應作十一不得早入聚落十二不得逼暮還十三應親近比丘不應親近外道十四應好順從比丘教十五不應作異語十六衆僧隨所犯為作訶責羯磨已不應復犯十七亦不應犯相似罪十八亦不應犯從生罪十九亦不應犯更重於此者二十不應嫌羯磨及羯磨人二十一善比丘為敷座供養不應受二十二不應受他洗足二十三不應受他安洗足物二十四不應受他拂革屣二十五不應受他揩磨身二十六不應受他禮拜二十七不應受他合掌二十八不應受他問訊二十九不應受他迎送三十不應受他持衣鉢三十一不應舉比丘作憶念三十二不應舉比丘作自言三十三不應證他比丘事三十四不應遮布薩自恣三十五不應共比丘諍二十五護戒神不殺生茶芻毗愈陀泥輸陀利輸陀尼毗樓遮那波阿陀龍摩坻娑羅桓尼和婆不偷盜坻摩阿毗婆馱阿須輸婆羅尼婆羅摩亶雄𡹐婆羅門地多那摩呼多耶舍不邪淫佛陀山陀樓多闍耶藪多婆沮坻陀多耶阿羅多賴都耶波羅那佛曇不妄語阿提梵者珊即因臺羅因臺羅阿伽風陀羅多佛曇彌摩多哆多賴叉三蜜陀不飲酒阿摩羅斯兜嘻那羅門闍兜帝薩尼乾那波闍鬪毗舍羅迦摩比那闍尼佉四種僧一四人僧除授大戒自恣出罪餘羯磨得作二五人僧除授大戒出罪餘羯磨得作三十人僧除出罪餘羯磨得作四二十人僧一切羯磨得作八難凡說戒自恣等遇八難起得略說八難者一王二賊三水四火五病六人七非人八惡獸八事失夜比丘犯僧殘行別住法每夜須白衆若八事不白謂之失夜八事者一往餘寺不白二有客比丘來不白三有緣事自出界不白四寺內徐行比丘不白五病不遣信白六二三人共一房宿七在無比丘處住八不半月說戒時白隨違一事失一夜得突吉羅罪
