body:
  text: 福州鼓山嗣祖沙門元賢述律部緣起昔世尊與五百比丘衆在毗蘭若婆羅門所夏三月安居時舍利弗於間靜處作是念言何者等正覺修梵行法得久住何者等正覺修梵行法不久住遂往問佛佛言毗婆尸式棄拘留孫迦葉此諸佛修梵行法得久住毗舍羅拘那含佛修梵行法不久住尊者問何以故佛言拘那含毗舍羅佛不廣為諸弟子説十二部經法乃至不結戒亦不説戒故諸弟子疲厭是以法不久住毗婆尸等佛為諸弟子廣説十二部經法乃至為結戒説戒故能流布後代不令疾滅尊者即從座起整儀白佛請為比丘結戒説戒令法得久住佛言且止我自知時後因諸比丘有漏法生乃為隨事結戒結戒大約有十義一攝取于僧二令僧歡喜三增僧安樂四令未信者信五令信已令增長六難調者令調順七慚愧者令安樂八斷現在有漏九斷未來有漏十令正法久住佛成道後三十八年赴王舍城國王齋食訖令羅云洗鉢失手墮地碎為五片佛言此表我滅度後初五百年諸惡比丘分我毗尼藏為五部也後第四袒毱多尊者有弟子五人各執己見果分毗尼藏為五部一曇無德部此云法密法名四分二薩婆多部此云一切有法名十誦三彌沙塞部此云不著有無觀法名五分四迦葉遺部此云重空觀法名解脫五婆粗富羅部此云著有行亦云犢子其舊律名摩訶僧祗此云大衆僧祗為根本分出為五部今此方犢子律本未至迦葉遺止有解脫戒本一卷餘三部皆全具五部分起之緣此土律師所傳同作是説然舍利弗問經所載先佛懸記與此逈異今録于左舍利弗問經舍利弗白佛言云何世尊為諸比丘所説戒律或開或閉後世比丘比丘尼優婆塞優婆夷云何奉持佛言如我言者是名隨時在此時中應行此語在彼時中應行彼語以利行故皆應奉持我尋泥洹大迦葉等當共分別為比丘比丘尼作大依止如我不異迦葉傳付阿難阿難復付末田地末田地復付舍那婆私舍那婆私復付優婆笈多優婆笈多後有孔輸柯王世弘經律其孫名弗沙密多羅嗣正王位聽信邪言統諸兵衆毀塔滅僧流血成川五百羅漢逃奔山谷次燒經臺彌勒菩薩以神通力接我經律上兜率天次至牙齒塔塔神曰有蟲行神先索我女我薄不與今誓護法以女與之使王心伏蟲行神喜手捧大山用以壓王及四兵衆一時皆死其後有王性甚良善彌勒菩薩化作三百童子下於人間以求佛道從五百羅漢𧫎受法教國土男女復共出家如是四衆還復滋繁羅漢上天接取經律還於人間時有比丘名曰總聞𧫎諸羅漢及國王分我經律多立臺館為求學來難時有一長老比丘好於名聞亟立諍論抄治我律開張增廣迦葉所結名曰大衆律外採綜所遺誑諸始學別為群黨互言是非時有比丘求王判決王集二部行黑白籌宣令衆曰若樂舊律可取黑籌若樂新律可取白籌時取黑者乃有萬數時取白者只有百數王以皆是佛説好樂不同不得共處學舊者多從以為名為摩訶僧祗也學新者少而是上座從上座為名為他俾羅也他俾羅部我去世時三百年中因於諍故復起薩婆多部及犢子部於犢子部復生曇摩尉多別迦部跋陀羅耶尼部沙摩帝部沙那利迦部其薩婆多部復生彌沙塞部目楗羅優波提舍起曇無屈多迦部蘇婆利師部他俾羅部復生迦葉維部修多蘭婆提那部四百年中更生僧伽蘭提迦部摩訶僧祗部我滅度後二百年中因於異論生起婆訶羅部盧迦尉多羅拘拘羅部婆收婁多柯部鉢蠟若帝婆耶那部三百年中因諸異學於此五部復生摩訶提婆部質多羅部末多利部如是衆多久後流傳若是若非唯餘五部各舉所長名其服色摩訶僧祇部勤學衆經宣講真義以處本居中應著黃衣曇無屈多迦部通達理味開導利益表發殊勝應著赤色衣薩婆多部博通敏達以導法化應著皂衣迦葉維部精勤勇猛攝護衆生應著木蘭衣彌沙塞部禪思入微究暢幽密應著青衣前説則五部一時所分後説則五部以漸而分前説則犢子部在五部之數僧祗弗與焉後説則犢子部已絶惟并僧祗為五部也二説未知孰是以理推之五部無一時並分之理而犢子經律不至于此亦可知其不傳也疑當以後説為實所言五部分為五色衣者乃是五壞色非五正色也有偽造經名遺教三昧經言羅旬喻分衛空還佛知其宿因乃令僧將律分為五部服色亦五使其日隨一部中行便大得食此全是偽説羅旬喻事乃佛懸記非佛在日之事況言佛令僧分律為五服色亦五是佛自為亂首也謬妄甚矣智者考舍利弗問經當自知之舍利弗言如來正法云何少時分散如是既失本味云何奉持佛言摩訶僧祗其味純正其餘部中如被添甘露諸天飲之但飲甘露棄於水去人間飲之水露俱進或時消疾或時結病其讀誦者亦復如是多智慧人能取能捨諸愚癡人不能分別三皈依皈依者以回轉為義由昔背正從邪流浪六趣今知其非即回彼邪心轉從正道於是乃立三皈之法必須志心皈依不可泛泛若皈佛已寧捨身命終不依於自在天等若皈法已寧捨身命終不依于外道典籍若皈僧已寧捨身命終不依于外道邪衆若不如是不名皈依此三皈有五等不同一翻邪三皈乃在俗初知皈向者二五戒三皈乃在俗受五戒者三八戒三皈乃在俗受八關齋戒者四十戒三皈乃初出家作沙彌者五菩薩三皈乃發心受菩薩戒者始自背俗之初終于造道之極皆依三寶以為依附之主三寶亦有多種一化相三寶丈六金身是佛寶四諦十二因緣是法寶聲聞緣覺諸賢聖是僧寶此乃二乘所皈依者也二別相三寶法報化身是佛寶十二部經是法寶三乘聖賢是僧寶此是大乘所皈依者也三一體三寶真如覺了是佛寶全體軌持是法寶事理和合是僧寶此是前二三寶之實體也四住持三寶刻像圖形是佛寶黃卷赤軸是法寶剃髮染衣是僧寶此是上三種之所寄以流通後代者也大小權實雖有不同但能皈依皆是入道之正門菩提之真因功德殊常未可思議生善經云若人受三自皈所得果報不可窮盡如四大寶藏舉國人民七年之中運出不盡受三皈者其福過彼不可稱計校量功德經云四大洲中滿二乘果有人盡形供養乃至起塔不如男子女人作如是言我某甲皈依佛皈依法皈依僧所得功德不可思議以諸福中三寶勝故又云若三千大千世界滿中如來如稻麻竹葦若人四事供養滿二萬歲諸佛滅後各起寶塔復以香花供養其福雖多不如有人以清淨心歸依佛法僧三寶所得功德木患子經波琉璃王白佛言我國中災患使我憂勞願賜易修要法佛告王言若欲滅煩惱障業障報障者當貫木患子一百八常以自隨行住坐臥恆當一心無分散意稱佛陀達磨僧伽乃過一患子如是漸次度木患子若十若二十若百若千乃至百千萬億若能滿二十萬遍身心不亂無諸諂曲捨命得生第三炎摩天滿百萬遍當得斷除百八結業始名背生死流趣向泥洹斷煩惱根獲無上果又告王言莎斗比丘誦三寶名經歷十歲得成斯陀含果漸次習行今在普香世界作辟支佛折伏羅漢經云昔一忉利天子壽命垂盡五衰相現觀壽終後墮豬胎中愁悶不樂有天語言今惟有佛能脫卿罪耳即到佛所作禮白佛佛言欲離豚胎當誦三歸即從佛教晨夜自歸七日壽終下生維耶離國作長者子逢舍利弗請佛説法得阿惟越致大方便經云以三寶為所歸者以救護為義譬人獲罪於王投向異國以求救護異國王言汝來無畏但莫出我境莫違我教必相救護衆生亦爾繫屬于魔有生死罪皈向三寶以求救護若誠心皈依更無異向不違佛教魔王邪惡無如之何三歸者亦名優婆塞優婆夷上品歸依者心冥一體三寶諸戒自然具足中品歸依者當如莎斗比丘持誦三寶名或一佛名久久不退可成聖果下品歸依者當食五淨肉不作屠沽魁膾獄卒妓女等惡業邪惡之友莫與往來遇三齋月六齋日亦須禁止酒肉五辛如此行持彌勒初會即得解脫五淨肉者不為我殺不見殺不聞殺自死鳥獸食殘也三齋月者正五九月乃毗沙門天王分鎮南洲之月也六齋日者初八二十三日天王使者巡察人間十四二十九日天王太子巡察人間十五三十日天王自身巡狩人間也五戒五戒者一不殺生二不偷盜三不邪淫四不妄語五不飲酒前四戒此方世法及轉輪王法亦皆不許後一戒惟佛獨遮以酒能亂心增長放逸前之四戒亦因而破故獨遮也此戒條相雖約境量實寬依之受持功德難量上品持者得聖道中品持者得天道下品持者得人道又五戒雖局在家實通出家以此戒能為沙彌戒比丘戒之根本亦為菩薩戒之根本若人精而持之廣而推之靡所不攝靡所不至也受者切莫輕視若人受三皈已受一戒者名一分優婆塞優婆夷受二戒者名少分受三戒四戒者名多分受五戒者名滿分隨其意樂受之皆得勝福終成菩提若不受皈戒者墮落三途人天路絶五戒若難遍持但發勇猛誓願終身堅持一戒亦可以一善成功如一舉子家三代受不殺戒不畜貓狸臨場屋卷不中式有鼠三銜至案前遂得第又一少年單持不妄語戒夜半從盜路遇叔問何往少年不敢對遂還後盜發得免死彌勒問經云五戒名五大施謂攝取無量衆生故成就無量衆生樂故以增長種種功德故受五戒者可得但受五日十日一年二年隨意多少受之受五戒後不能遍持者隨所重可得分還但向本師或清淨比丘前言我某甲從今日不復持某戒如是三説名還戒法欲受五戒必須先斷食肉佛於諸經説無量因緣呵止食肉蓋以食衆生肉傷損慈心即為魔鬼所攝況食彼身分非彼所願即成盜業亦成債負理必酬還是畜生因也凡受三皈五戒者必當發願如律所示白云願以此皈戒功德不墮惡趣八難邊地持此功德攝取一切衆生之惡所有功德惠施彼人使成無上正真之道亦使將來彌勒佛世三會得度生老病死若單發願回向西方亦可優婆塞戒經云若人受皈戒後為護宅舍及身命祀鬼神者不失若志心禮拜外道鬼神者名失若祠祀不得殺生命五戒對攝十善殺盜淫三戒對攝身中救生業布施業梵行業不妄語一戒對攝口中誠實語質直語和諍語常軟語不飲酒一戒對攝意中不淨觀慈悲觀因緣觀愚謂意三攝于飲酒一戒固是但五戒雖制身口其實身口所犯悉意三所發若徒制身口非善持五戒也持五戒者知之五戒配五常不殺配仁不盜配義不淫配禮不妄語配信不飲酒配智生善經云有善男女布施滿四天下衆生四事供養盡于百年不如一日一夜持戒功德智度論云若人棄捨此戒雖山居苦行食果服藥與禽獸何異若人雖處高堂大殿好衣美食而能持戒者得生好處及得道果八關齋八關齋者共有九支一不殺二不盜三不淫四不妄語五不飲酒六不著華鬘及香油塗身七不歌舞倡伎及往觀聽八不高廣床上坐九不非時食前八支名關謂關閉八惡不起諸過也後一支名齋謂過中不食同諸佛食也在家二衆若三善月六齋日及本生日父母諱日作諸善事日應詣僧中求授此戒若無人時但心念口言亦得成受俱舍論云若先作意於齋日受者雖食後亦得受受戒人下心合掌隨施戒人語勿前勿後若違不成成實論云五戒八戒隨日月長短或一年一月乃至半日半夜重受減受並得薩婆多云若受八戒應言一日一夜等語言決絶莫使與終身戒相混增一阿含經云若受八戒先須懺罪然後受之墮舍經云若于六齋日奉持八戒一日一夜福不可計論云若在家男女盡形受持必獲菩提乃至一晝一夜受持八戒者頓超一生五戒何故以戒多故菩薩處胎經云八關齋者是諸佛父母智度論云劫初聖人教之持齋修善以避凶者直以一日不食為齋後佛出世教人持八戒過中不食是功德將人至涅槃此戒雖暫而實大以戒戒皆言如諸佛則非五戒所可倫也故諸經論或言必獲菩提或言諸佛父母或言將人至于涅槃受者須知此意優婆塞戒此戒出優婆塞戒經亦謂之菩薩戒在家菩薩梵網通收今此一途大乘別出上視梵網固難恍惚下視五戒則霄壤懸隔矣欲受此戒應令是人滿六月日親近承事出家智者然後和合衆僧滿三十人為作白羯磨受優婆塞戒優婆塞戒六重罪一殺戒上至天人下至蟻子二盜戒下至一錢三虗説戒言我得不淨觀阿那含等四邪淫戒五宣説四衆過戒六酤酒戒優婆塞戒二十八失意罪一不能供養父母師長戒二耽樂飲酒戒三惡心不能瞻視病苦戒四有來乞者不能多少分與遣空還戒五見四衆不能承迎禮拜問訊戒六見四衆毀所受戒心生憍慢戒七月六齋日不受八戒供三寶戒八四十里中有講法處不能往聽戒九受招提僧臥具牀坐戒十疑水有蟲故便飲戒十一險難之處無伴獨行戒十二獨宿尼寺戒十三為財命打罵奴婢僮僕外人戒十四以殘食施四衆戒十五畜養貓狸戒十六畜養象馬牛羊駝驢一切畜獸戒十七不畜僧伽黎衣鉢錫杖戒十八若須田作不求淨水及陸種處戒十九物説價已捨賤趣貴斗稱量物不令平用戒二十非處非時行欲戒二十一隱瞞官稅戒二十二犯國制戒二十三得新穀果蓏菜茹不先奉供三寶先自受戒二十四僧若不聽説法讚嘆輒自作戒二十五道路上在比丘沙彌前行戒二十六僧中付食若偏為師選擇美好過分與他戒二十七養蠶戒二十八路遇病者不能瞻視為作方便付囑所在戒經云優婆塞戒不可思議何以故受是戒已雖受五欲而不能障須陀洹果至阿那含果是故名為不可思議又云優婆塞戒名為纓珞名為莊嚴其香微妙熏無不遍遮不善法為善法律即是無上妙寶之藏上族種姓大寂靜處是甘露味生善法地直發是心尚得無量利益況復一心受持不毀經云有四事法所不應為貪因緣不應虗妄為嗔因緣不應虗妄為癡因緣不應虗妄為怖因緣不應虗妄為有二事不應為一樗蒲圍碁六博二種種歌舞伎樂有四種人不應親近一碁博二飲酒三欺誑四酤酒有四種惡人常應離之一樂説他過二樂説邪見三口耎心惡四少作多説沙彌戒沙彌此云勤䇿亦云息慈乃初入道之名自年七歲至十三歲名驅烏沙彌自十四至十九歲名應法沙彌應法復有二未受十戒者名形同沙彌已受十戒者名法同沙彌年二十已上未受戒者名名字沙彌七十已上不許進具者名老沙彌十戒者一盡形壽不殺生上至羅漢師僧父母下至蜎飛蠕動但有命者不得故殺或自殺或教他或見殺隨喜皆犯殺罪誤傷者不犯二盡形壽不盜金銀重物下至一針一草不得不與而取或奪取或竊取或詐取乃至偷稅冒渡等皆犯盜罪三盡形壽不淫凡犯世間一切男女乃至畜生悉名破戒四盡形壽不妄語妄語有四一妄言見言不見不見言見知言不知不知言知等二綺語謂粧飾浮言靡語眩人心目等三惡口謂粗惡罵詈等四兩舌謂向此説彼向彼説此挑唆起諍等乃至前譽後毀面是背非證入人罪發宣人短皆妄語也若自言證聖得上人法則其罪極重或為救他方便權語不犯五盡形壽不飲酒一切酒俱不許飲乃至不得嘗酒不得嗅酒不得以酒飲人若用以冶病者不犯六盡形壽不著華鬘及香油塗身華鬘者西域貫華作鬘以嚴其首此土則繒絨金寶製飾巾冠之類香油塗身者西域貴人用香末令青衣塗身又以花浸油塗身此土則佩香熏香脂粉之類出家之士披壞色衣豈可為此七盡形壽不歌舞倡伎及往觀聽歌者口出聲音舞者身為戲舞倡伎者琴瑟簫管之類不得自作亦不得觀聽他作至如圍棋六博樗蒲骰擲之類悉所不應八盡形壽不坐高廣大床佛制繩床高不過如來八指過此則犯乃至雕刻漆彩及紗絹帳褥之類亦不宜用九盡形壽不非時食非時者曰已過中非僧食之時也經云諸天早食佛午食畜生午後食鬼夜食僧宜學佛斷六趣因故食不過午今人體弱或病多不能持必須自知慚愧不多食不美食不安意食庶幾可耳十盡形壽不捉持生像金銀寶物梵語生像華言金銀華梵並彰故曰生像金銀寶物者七寶之類昔佛世時僧不手捉多敕淨人掌之今不能然必須自知慚愧不營求不厚畜庶幾可耳沙彌十二有可犯一不分別衣二離衣宿三觸火四足食食五害生種六青章上棄不淨七輒上高樹八觸寶九食殘宿食十壞地十一不受食十二損生苗請僧福田經沙彌應知五德一發心出家懷佩聖道故二毀其形好應法服故三永割親愛無適莫故四委棄身命遵崇道故五志求大乘為度人故僧祇律應為説十數一者一切衆生皆依飲食二者名與色三者癢痛想四者四諦五者五陰六者六入七者七覺支八者八聖道九者九衆生居十者十一切入其列數釋相對治顯正並廣如行事鈔説沙彌犯前四重者俱突吉羅罪滅擯起惡見三諫不捨亦滅擯餘有所犯俱突吉羅懺悔沙彌尼戒同沙彌結罪亦同今不贅列式叉摩那戒式叉摩那此云學戒女凡沙彌尼欲進具戒者應與二年學戒若是童女年十八與二年學戒若是已出嫁女年十歲與二年學戒二年學者可知其有胎無胎故曰二歲淨身六法淨心式叉摩那三學一學四重即淫盜殺妄二學六法謂與染心男身相觸盜四錢以下殺畜生小妄語非時食飲酒三學大尼諸戒及威儀惟除為大尼過食及自受食食犯四重者滅擯犯六法者突吉羅懺悔再與二年學戒犯大尼衆戒者俱突吉羅比丘戒比丘一云苾芻此翻乞士謂上於諸佛乞法以資慧命下於衆生乞食以養色身也又云破惡謂能破見思二惑也又云怖魔謂比丘三度震動魔宮也沙彌年二十求進具足戒者須為審問無諸遮難乃可為備衣鉢請十師十師中一人為羯磨師一人為教授師并本師和尚名三師餘七衆為尊證師集衆登壇審問遮難然後為作白四羯磨與具足戒次為説四重名相次為説四依是謂如法成就比丘戒遮難共二十七事作沙彌時犯四重罪或曾受大比丘戒犯重被擯今來乞戒者不許受作白衣時曾犯淨行比丘尼者不許受作白衣時沙彌時盜聽大僧説戒羯磨遂詐稱大僧同僧法事志在衣食者名為賊住不許受先從外道來受具戒後捨戒還入外道今又重來者名破內外道不許受生犍妬變半及自截等諸不男不許受殺父殺母殺阿羅漢破僧出佛身血名為五逆不許受諸天阿修羅及諸鬼神變為人形而來受戒者不許受諸畜生能變為人形而來受戒者不許受身具男女二根者不許受問和尚名而不答問己名亦不答者不許受年未滿二十者不許受衣鉢不具足者不許受父母不聽出家者不許受負人債而來者不許受他家奴主未捨而來者不許受在朝官人有祿有位者不許受年已滿七十者非丈夫位不許受身有惡疾如疥癲白癩癰疽乾痟癲狂者不許受又六根不具形相怪惡或種種惡病有辱法門者佛俱不許受具足戒共二百五十事波羅夷法四事僧伽婆尸沙法十三事不定法二事尼薩耆波逸提法三十事波逸提法九十事波羅提提舍尼法四事應當學法一百事滅諍法七事四依法一依糞掃衣若得長利檀越施衣割壞衣得受二依乞食若得長利若僧差食檀越送食月八日食十五日食月初日食若僧常食檀越請食得受三依樹下坐若得長利若別房尖頭屋小房石室兩房一戶得受四依腐爛藥若得長利酥油生酥蜜石蜜得受比丘具足四義一受具足謂白四羯磨二隨具足謂從此向後隨一一戒常護持故三護他心具足謂一分威儀具足不為衆所嫌四具足守戒謂雖小罪畏而不犯若有犯當發露比丘尼戒比丘尼此云乞士女沙彌尼二歲學戒畢無諸過患方可進具和尚尼可備衣鉢請尼中十師為授戒先審問遮難次為作白四羯磨授之次十師將此沙彌尼至大僧中為請僧重授戒僧中亦為集十師登壇審問遮難白四羯磨羯磨已為説八棄名相次為説四依法謂之如法成就佛制尼從二部受戒後傳至此土尼無能授者乃但從大僧邊受之近年諸師全不知授法苟簡妄作乃雜在比丘中授之是女而授男戒也欺己欺人罪莫大焉比丘尼遮難共二十九事曾作沙彌尼式叉摩那犯四重及受大戒犯八重還俗訖重來者名邊罪不許受作白衣婦時曾犯淨行比丘者不許受曾盜聽大僧説戒羯磨等冒稱比丘尼希圖利養者名為賊心入道不許受曾為外道來入僧中受戒後復歸外道今又重來名破內外道不許受有螺筋鼓角脈五種不女不許受有殺父者殺母者殺阿羅漢者破和合僧者出佛身血者俱不許受有諸天女阿修羅女鬼神女變形而來受戒者不許受有諸畜生女能變為人形而來受戒者不許受一有身中具男女二根者不許受問名而不答問和尚名亦不答教乞戒而不乞戒者俱不許受童女年未滿二十出嫁女年未滿十二者不許受衣鉢不具足者不許受父母夫主不聽出家強來者不許受負人債而來者不許受人家婢主未捨而來者不許受有女人年至七十不任受大尼戒者不許受女人有病疥癩癰疽白癩乾痟癲狂二形二道合道小常漏大小便涕唾常流者俱不許受外有六根不具相貌怪惡種種惡病有辱法門者佛皆不許受比丘尼具足戒三百四十八事波羅夷法八事淫盜殺妄觸八覆隨僧伽婆尸沙法十七事尼薩耆波逸提法三十事波逸提法一百七十八事波羅提提舍尼法八事突吉羅法一百事滅諍法七事尼無不定法四依法全同大僧今不贅列尼行八敬法一不得罵詈比丘二不得舉比丘過比丘得舉尼過三應從大僧受具戒四犯僧殘半月在二部僧中行摩那埵五半月當于僧中請教誡師六不應于無比丘處結夏安居七夏訖當往僧中求自恣八百歲尼禮初夏比丘足菩薩戒菩薩戒者即菩薩萬行乃進趣菩提莊嚴法身之大道也其戒遍周九界極盡未來非可以數量局非可以名相陳姑約其大槩名為三聚一攝律儀戒謂無惡不斷也二攝善法戒謂無善不修也三攝衆生戒謂無生不度也但為下凡癡暗昧于進修乃有梵網一經略示蹊徑使知所適從然亦大海中之一滴而已引而伸之觸類而長之是在智者梵網波羅夷罪十戒一殺戒二盜戒三淫戒四妄語戒五酤酒戒六説四衆過戒七自讚毀他戒八慳惜加毀戒九瞋心不受悔戒十謗三寶戒梵網輕垢罪四十八戒一不敬師友戒二飲酒戒三食肉戒四食五辛戒五不教悔罪戒六不供給請法戒七懈怠不聽法戒八背大向小戒九不看病戒十畜殺具戒十一國使戒十二販賣戒十三謗毀戒十四放火焚燒戒十五僻教戒十六為利倒説戒十七恃勢乞求戒十八無解作師戒十九兩舌戒二十不行放救戒二十一瞋打報仇戒二十二憍慢不請法戒二十三憍慢僻説戒二十四不習學佛戒二十五不善知衆戒二十六獨受利養戒二十七受別請戒二十八別請僧戒二十九邪命自活戒三十不敬好時戒三十一不行救贖戒三十二損害衆生戒三十三邪業覺觀戒三十四暫念小乘戒三十五不發願戒三十六不發誓戒三十七冒難遊行戒三十八乖尊卑次序戒三十九不修福慧戒四十揀擇受戒戒四十一為利作師戒四十二為惡人説戒戒四十三無慚受施戒四十四不供養經典戒四十五不化衆生戒四十六説法不如法戒四十七非法制限戒四十八破法戒菩薩隨身十八種物楊枝澡豆三衣瓶鉢坐具錫杖香爐奩漉水囊手巾刀子火燧鑷子繩床經律佛像菩薩像經言十八種物許常隨身非謂必備方為菩薩也世之受菩薩戒者汲汲乎惟十八物是辦肩荷隨身便為畢事膠彼瑣儀忘其大義上求下化之弘規果如是而已哉梵網經云衆生受佛戒即入諸佛位若不受此戒外道邪見人畜生與木頭平等無有異故知不受菩薩戒者縱學佛法勤苦修行經千萬劫祗名衆生欲脫生死欲破業障欲成菩提終無得理縱或受已毀戒還是佛之弟子若不受者名為外道故經云薝蔔花雖萎猶勝一切花破戒諸比丘猶勝諸外道今此菩薩三聚淨戒受之者報圓佛果相好無邊三達五眼十力無畏一切功德無不具足即于此身一念之中訖至成佛具足八種殊勝功德一者趣道場殊勝當知受菩薩戒者如大鵬鳥舉翅高飛能至十萬九千里菩薩發心受此大戒能越六趣二乘徑趣無上菩提坐于道場二者發心殊勝若人一念發大悲大智之心受菩薩戒即超過二乘境界如昔有沙彌侍一羅漢而行忽發菩提心欲受菩薩戒此羅漢反生恭敬為擔衣鉢讓路而行三者福田殊勝假使有人供養滿閻浮提大阿羅漢不如供養一發心受菩薩戒者以彼運心廣大故四者功力殊勝若受小乘戒者猶如螢火但能自照受菩薩戒者狀似日光當午一切普照故五者滅罪殊勝經云受戒後破戒猶勝諸外道以外道邪見永沉惡道無有出期破戒之人以戒威力故設墮惡道受罪輕微若墮地獄中作地獄中王若墮畜生中作生畜中王若墮餓鬼中作餓鬼中王所生之處不失王位經云有犯名菩薩有戒可破故無犯名外道無戒可破故六者受胎殊勝受戒之人若在胞胎中常為天龍善神所共守護故七者神通殊勝受戒之人以持戒力故能攪長河為酥酪變大地作黃金能于一念中超越千生能于一日內度無數衆故八者果報殊勝受戒之人即是菩薩當生蓮花藏海受法性身一得真常永不退轉故受菩薩戒者當以發菩提心為先菩提心者四弘誓願也若實發此誓願復以至誠心仰承大戒則能發起無作戒體方名得戒既得此戒後或遇緣破犯亦自有殊勝功德故云破戒諸比丘猶勝諸外道又云所生之處不失王位若無此真實廣大之心但希破後功德輕求受戒者則戒決不可得戒既不可得況破後功德乎求受戒者宜知此意此戒體不發則已發即是性故名無作小乘明此別有一善能制定佛法憑師受發極至盡形或依定依道別生皆以心力勝用有此感發成實論判為非色非心聚律師多依此説未盡其義大乘明戒是色聚謂大乘情期極果憑師一受遠至菩提隨定隨道誓修諸善誓度含識亦以心力大故別發戒善為行者所緣止息諸惡大論云罪不罪不可得具足尸羅此是戒度正體以心生口言從今受息身口惡法是名為戒即無作也此無作雖無色相而有能持所持有得有失亦似有色相故曰假色亦名無表色也授戒羯磨文云初番羯磨時十方妙善戒法悉皆震動第二番羯磨時諸妙善戒法舉集虗空之中如雲如蓋覆汝頂上第三番羯磨時此諸妙善戒法從汝頂門灌注身心充滿正報汝心汝身即是無邊功德之聚此文正形容無表之色如此雖非實有戒從外來然亦不可謂自心本具無得與不得蓋以理雖本具藉緣方發故也
