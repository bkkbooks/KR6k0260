body:
  text: 福州鼓山嗣祖沙門元賢述結界比丘住處先當結界蓋羯磨説戒授戒治罪等事悉依界立若無界則諸法皆不能成就也結界者當打楗椎集衆不與欲先唱定四方界相若山若谷若河若田園若村坊若林木若巖石等然後作白二羯磨當白云大德僧聽今此住處東至某西至某南至某北至某若僧時到僧忍聽今于此一住處一説戒結界白如是大德僧聽今此住處東至某云云今于此一住處一説戒結界誰諸長老忍僧于此一住處一説戒結界者默然誰不忍者説僧忍默然故是事如是持有住處地廣人多諸比丘各造屋居或樹下或石窟散處不一當結大界亦如前法但改結界為結大界改一住處一説戒為同一住處同一説戒餘並同有五衆十衆二十衆不能遠往説戒聽于大界內結作戒場先唱定小界相或山或水或墻垣或屋壁等羯磨亦如前但改結大界為結小界于同一住處同一説戒處改云于此四方小界內結作戒場餘者並同若有時諸比丘欲改狹界作廣界者有欲改廣界作狹界者必先解前界然後廣狹隨意結解大界亦當作白二羯磨白云大德僧聽此比丘同一住處同一説戒若僧時到僧忍聽今解界白如是大德僧聽此比丘同一住處同一説戒今解界誰諸長下可知解小界亦倣此若二住處比丘欲結共一説戒共一利養者當解前界應盡集一處不得受欲當唱四方相齊限然後作白二羯磨亦如前但于僧聽下云于某處某處結同一利養同一説戒界白如是下羯磨可知或有二住處僧欲同一説戒別利養者當解前界後作白二羯磨亦如前但于僧忍聽下改云於某處某處結同一説戒別利養界白如是餘羯磨可知或有二住處僧欲別説戒同利養者為欲守護住處故亦如前但于忍聽下改云于某處某處結別説戒同利養界為守護住處故餘可知有二住處僧同説戒同利養後又欲別説戒別利養者當先共解前界然後各別結界若比丘在村遠曠野中行遇布薩日應和合在一處共説戒當結小界作白二羯磨白云大德僧聽今有爾許僧集若僧時到僧忍聽結小界白如是羯磨下可知去時當作白二羯磨解界而後去凡有事緣當出界作羯磨者俱準此小界無四方界相者是即數人坐立之地為界也布薩布薩梵語訛略具云鉢多帝提舍那寐此云相向説罪即今半月半月説戒問清淨者是也凡住處當立説戒堂遇白月黑月十四十五日諸小比丘當先往堂中灑掃敷設坐具淨水然燈等一切所需之物時到令淨人沙彌打楗椎三通界內比丘盡集惟除未受戒及犯罪未懺悔者不許聽有為病因緣或如法僧事聽與欲若瑣末非如法僧事不聽與欲其來集現前人有可呵不得呵是名僧集和合僧中差一人能羯磨者作白説戒説者高座聽者下座各各披七條衣依次而坐如無事緣阻當全誦戒本若有事緣阻隨所至處便止餘云僧常聞或有事急不得誦時即起座或有勢力人要來聽戒者或先一日誦或延至次日誦或正誦戒時來者便當止云僧常聞或有強要誦畢者當亂其句讀誦之俾彼不可解也説戒比丘若有失誤次座比丘當授語若有事緣不能終誦者次座比丘當代誦若誦戒日比丘俱無能誦者當誦七佛略教偈如又不能當誦諸惡莫作衆善奉行自淨其意是諸佛教佛制五夏比丘當誦戒若不誦戒如法治若不能者終身不得離依止若一比丘住者當説戒日應詣説戒堂灑掃令淨敷坐具淨水瓶然燈火具舍羅若有客比丘來若四若過四應先白己然後説戒各各相向説今僧十五日説戒我某甲清淨如是三説若一人應心念口言如是三説若三人不得受第四人説欲清淨若二人不得受第三人説欲清淨若一人不得受第二人説欲清淨皆當各各自説説戒日有客比丘來客比丘少應從舊比丘求和合同説戒若客比丘來與舊比丘等亦應從舊比丘求和合同説戒若舊比丘少客比丘多應從客比丘求和合同説戒若説戒日舊住比丘集説戒經序有客比丘來少當告清淨次第坐聽若已説竟衆盡散亦當告清淨不告者如法治若客比丘來等舊比丘或多舊比丘應更與説戒不説者如法治若舊比丘説戒舊比丘來或少或等或多亦如前若客比丘説戒舊住比丘來或少或等或多亦如前菩薩比丘別作布薩未受菩薩戒者不許聽犯戒未清淨者亦不許聽半月半月向諸佛菩薩像前誦十重四十八輕戒若一人即一人誦若二若三乃至百千亦一人誦誦者高座聽者下座各各披九條七條五條袈裟依次而坐若有犯者出衆自首其罪犯十重者應與懺悔晝夜六時誦十重四十八輕戒苦到禮三世諸佛得見好相或光或花罪便消滅犯輕垢者對首發露懺悔罪便得滅菩薩比丘亦當聽説比丘戒不聽者得越法罪以攝律儀戒無所不該又佛制僧中軌則並依聲聞法建立既已共住便當共聽但中有開遮不同輕重各異者則由其行願之有別也説欲説欲者當説戒日諸比丘有如法僧事或病因緣意欲來而不能來乃以此欲意轉授與人來説也應具威儀至可傳欲人所作如是言大德一心念我某甲比丘如法僧事與欲清淨彼傳欲人至僧中僧中問有幾人説欲清淨即應出衆整儀白云大德一心念今有某甲比丘如法僧事與欲清淨一説便止或有病人不能來又無人可傳欲僧中應遣人往受欲病人當言我某甲為病因緣與欲清淨受欲人還僧中亦如是説其受欲人受欲已或有他緣不能至僧中説者應更與欲或受欲人已至僧中或眠或入定或忘不故作者亦成與欲若故不説者得突吉羅罪受欲人受一人欲亦得更受他人欲到僧中白云某甲某甲如法僧事與欲清淨或多人不能一一白名者但白云今有衆多比丘如法僧事與欲清淨有病比丘不能與欲者當舁來僧中或不可移者大衆當往病人所為説戒或有比丘為事與欲竟其事即休者可便往聽戒不往聽者當如法治僧中若自恣時應言與欲自恣餘詞並同凡僧中作羯磨集衆不能去者俱當與欲惟除結界不與欲以結界當盡集也安居安居佛初制夏三月安居本為護生以夏中方尺之地悉並有蟲故制也四月十六日結七月十五日解應白所依人言大德一心念我比丘甲某今依前三月安居房舍破修治故三説彼人言知莫放逸答言受持若無可依人心念言我某甲依某僧伽藍前三月安居後安居者改前字作後餘並同若來至所住處安居忘不結者亦成安居又才至其處便成安居明了論云無五過處得在中安居一太遠聚落乞求難得二太近城市妨修行道三多蚊蟻處自他兩損四無可作人人須具五德乃可依之五無施主供給飲食衣藥具五德者一未聞令聞二已聞令清淨三能為決疑四能令通達無滯五除邪見得正見凡安居不必盡在寺或阿蘭若或樹下或樹空中或石窟中或尖頭屋或船中但上不礙頭坐可容膝皆可安居但須離前五過比丘尼不安居波逸提餘四衆不安居突吉羅凡來安居四月十六日至者名前安居十七日及五月十五日至者名後安居前安居住前三月後安居住後三月並當滿九十日不滿者不得歲前安居人自恣後安居人亦同自恣前安居人自恣已數歲後安居人不許以九十日未足故前安居人分所得物後安居人亦應分與餘日應令住滿又有説三種安居者四月十六名前安居十七至五月十五名中安居十六日名後安居皆九十日滿數歲安居已若有如法事緣當往者當即日還若不能即日還者聽受七日法及七日當還受法但對首自白云大德一心念我某甲受七日法為某事故還來此中安居一説若事緣不能七日還者聽受過七日法或十五日或一月當作白二羯磨白云大德僧聽若僧時到僧忍聽某甲受過七日法或云十五日或云一月日為某事故還來此中安居白如是羯磨文可知若有數人可同羯磨若比丘安居已受七日法出界外過七日還彼比丘破前安居違本要故得罪若比丘安居已末後受七日法出界外若還若不還不破前安居不違本要故無罪若比丘受七日法出界外為母所留過七日還不失歲若比丘受七日法出界外以水陸不通賊難惡獸難等過七日還不失歲若比丘安居已見其中有淨行難命難應往白檀越求移去彼聽者善不聽者便應以此事去不破安居若比丘安居已飲食衣藥不得者應以此事去或其地多毒蟲恐損生命者應以此事去或有比丘比丘尼欲方便破僧者應以此事去不破安居或有比丘獨住安居若受七日法當心念口言云我某甲比丘今受七日法或云過七日等出界外為某事故還來此中安居三説自恣自恣者恣任他舉其過也九旬修道精練身心人多迷己不自省過今乃縱宣己罪恣僧舉過故云自恣九旬禁滿白月十五日自恣若有尼來則十四日自恣尼十五日自恣是日或小食上或大食上往説戒堂打楗椎集衆未受大戒人不許集執事應唱云大德僧聽今白月十五日衆僧集某處自恣僧集已應先差二受自恣人二人須各具五德一自恣五德不愛不瞋不怖不癡知自恣未自恣二舉罪五德知時不以非時如實不以虗妄有利益不以無利益柔軟不以粗獷慈心不以嗔恚若衆非雙差二人若衆少單差一人作白二羯磨白云大德僧聽若僧時到僧忍聽差比丘某甲某甲作受自恣人白如是羯磨文可知作羯磨竟二受自恣人方從座起至上座前禮足已白云大德僧聽今日衆僧自恣若僧時到僧忍聽僧和合自恣白如是其二人應各袒右肩脫革屣胡跪合掌從上座作自恣應云大德衆僧今日自恣我比丘某甲亦自恣若有見聞疑罪願大德長老哀愍故語我我若見罪當如法治三説衆僧次第應離座自恣竟二人應至上座前告云僧一心自恣竟便如常禮退若有老病者隨本座對前二人説或自恣日有八難事起不能廣説者應略説或二説或一説或各各共三説若難事急不得共三説者即應以此難事去或四人以下對首法當盡集更互自恣各各白云大德一心念今日衆僧自恣我某甲比丘清淨三説若三人二人亦淮此法若一人住處當自恣日應往説戒堂灑掃敷坐具等待客比丘若無客比丘應心念口言今日衆僧自恣我比丘某甲清淨三説自恣後當受歲受歲者謂出家之人不以生年數歲須以出家坐夏滿日為一歲其有過犯破安居者不得歲自七月十六日始又云臘者乃交接之義謂當七月十六日乃新歲舊歲交接之會也受藥佛言藥有四種一時藥二非時藥三七日藥四盡形壽藥時藥者有二種一蒲闍尼食謂飯乾餅等二佉闍尼食謂枝葉花果及細末食此二種食自明相出至日中皆可食謂之時食受此食者一要分別知是食非是食二要有施心三要如法授與乃可受食非時藥者日已過中前二種食不得食或有病因緣佛聽以梨棗蕤蔗等汁作漿若不醉人應非時飲亦不應今日受漿留至明日若飲如法治五分復開蜜漿若諸漿澄如水色以水渧淨已從淨人手受對比丘加受法云大德一心念我比丘某甲今為渴病因緣此是某漿為欲非時服故今于大德邊受三説若無渴病而飲者得罪七日藥佛言酥油生酥蜜石蜜五種有病因緣聽非時服加受法云大德一心念我比丘某甲今為某病因緣此酥等七日藥為欲共宿七日服故今于大德邊受三説若畜過七日者得罪盡形壽藥如一切鹹苦酢辛不任食者即薑椒及丸散之類是也佛聽盡形服加受法云大德一心念我比丘某甲今為病因緣此某等是盡形藥為欲共宿長服故今于大德邊受三説分亡僧物五衆若亡所有衣物餘不可得惟屬于僧以出家財物必從僧得佛法無分故當入僧但僧有四方現在之殊物有輕重之別其分物之法具如後列一審債負佛言應問看病人誰負病者物病者負誰物若負病者物應為索取入僧若負他人物應持長衣償之若無賣三衣償之有餘與看病人二問囑授佛言應問看病人言病人有囑授否若云病人臨終時言此物與佛與法與僧與塔與人若我終後與者佛言應索取現前僧分五分云若生時與人未持去者僧應白二羯磨與之三捨物時僧祗言若病人死應持戶鉤付僧知事人然後供養舍利毗尼母云先將亡者藏殯已送喪僧回寺乃持亡僧衣物著僧前持來者白云大德僧聽某甲比丘在此住處命終所有衣物此住處現前僧得分如是三説而捨四分輕重物佛言若五衆死一切所有盡當屬僧若有田園果樹別房及屬別房物銅瓶銅甕斧鑿燈臺繩床坐蓐臥蓐氍氀車輿守僧伽藍人水瓶澡灌器錫杖鐵器木器陶器皮器竹器及諸種種重物並不應分屬四方僧若剃刀衣鉢坐具針筒俱夜羅器等輕物俱現前僧得分衆中可令一人處分其可分物不可分物各別一處五賞看病人佛言看病人須具五法五法成就應與病人衣物五法者一知病人可食不可食可食應與之二不惡賤病人大小便唾吐三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病者説法己身於善法增益僧祇律有四種暫作若僧差作若自樂福作若邪命作並不合賞若為饒益病者欲令速差下至然一燈炷遇命終者亦合賞五分云多人看病與究竟者摩得勤伽云白衣看病亦應與少許佛言看病人應與六物針筒盛衣貯器當作白二羯磨與白云大德僧聽某甲比丘命過所有三衣等物此現前僧應分若僧時到僧忍聽僧今與某甲看病比丘白如是羯磨文可知六分輕物五人已上共住一人死當作展轉分僧中差一人作白二羯磨白云大德僧聽某甲比丘命過所有衣物現前僧應分若僧時到僧忍聽今持是衣物與比丘某甲某甲當還與僧白如是羯磨文可知作此法已隨現前多少取其衣物依數分之客僧至亦得分但分衣入手方至者不得五分云若不遍者和僧與一無衣比丘若一衣極好不須割裂並有者從上行之須者直付之四人共住一人死應作直分其賞看病人惟三人口和以衣付言諸大德憶念今持亡比丘某甲衣鉢等與看病比丘三説自餘輕物作白二羯磨云大德僧聽若僧時到僧忍聽某甲比丘命過所有衣物現前僧應分白如是羯磨文可知客比丘至同前三人共住一人死應共分其賞看病人二人口和以衣付言同上其餘輕物彼此三語共分應言大德聽此亡比丘某甲衣物應屬我等三説客比丘至同前二人共住一人死在者手取衣口言此亡比丘某甲衣物應屬我三説客至者不得以手執衣故若有為病人求醫藥衣食及為塔事僧事雖不現前當與一分若淨人亦得半分若死在白衣家者輕物隨現前五衆分重物送近處僧伽藍若無五衆并送與近處僧伽藍六聚懺法懺波羅夷法波羅夷此云棄謂永棄佛海邊外無道果分也犯者應滅擯若犯已無覆藏心哀求懺悔者當與學戒羯磨與是戒者奪三十五事盡形行之不得超出若衆僧説戒羯磨時來與不來無犯若更犯重應滅擯若能證阿羅漢果方超入大僧位僧祇云犯重也啼哭不肯離袈裟又深樂佛法者應與學戒學戒者比丘不淨食彼亦不淨彼不淨食比丘亦不淨得與比丘過食除火淨五生種及金銀已從沙彌受食十誦云佛所結戒一切受行在大比丘下坐不得與大僧同室宿過三夜自不得與未受具戒者同室宿過二夜得與僧作自恣布薩二種羯磨不得足數授戒出罪若餘衆法不得作得受歲不得衆中誦律無人者聽之懺僧伽婆尸沙法僧伽婆尸沙此云僧殘謂罪鄰于棄如人為他所斫僅存咽喉理宜速救也犯者若覆藏應隨其所覆之日與波利婆沙行波利婆沙竟與六夜摩那埵行摩那埵竟與二十僧中出罪若犯而不覆藏者直付與摩那埵六夜竟便與二十僧中出罪若二種行法中重犯者隨所犯與本日治波利婆沙此云別住行謂得羯磨已奪三十五事在僧下行八事失夜白僧發露供給衆僧盡覆日行之摩那埵者此云極苦卑劣行大略與波利婆沙同但在僧中宿為異耳懺偷蘭遮法偷蘭遮此云醜惡有二種一從生二獨頭從生偷蘭遮有三品從棄罪生重偷蘭遮名上品應向一切僧中悔過若從棄罪生輕若從僧殘生重名中品應出界外四比丘衆中悔過若從僧殘生輕應向一清淨比丘前悔過獨頭偷蘭遮亦有三品上品者如破轉法輪僧殺天盜四錢等名上品如破羯磨僧盜三錢二錢名中品如食生血肉惡心罵僧盜一錢等名下品三品悔過並同從生懺波逸提法此聚分二位一名尼薩耆波逸提此云捨墮其事皆于財物上犯今罰其財物往僧中捨故名捨墮一名波逸提此云墮其事並是言行上犯無物可捨故單名墮也懺捨墮者此物不可別衆捨若捨不成捨得突吉羅罪當往僧中捨偏袒右肩脫革屣禮上座足已胡跪合掌白云大德僧聽我某甲比丘故畜若干長衣犯捨墮我今捨與僧一説捨衣竟即于僧中乞懺悔白云大德僧聽我某甲比丘故畜若干長衣犯捨墮是衣已捨與僧今有衆多波逸提罪從僧乞懺悔願僧聽我某甲比丘懺悔慈愍故三説已當請懺悔主其懺悔主須未犯罪者或犯已懺悔竟者名清淨比丘方可受懺整儀作白云大德一心念我某甲比丘今請大德為波逸提懺悔主願大德為我作波逸提懺悔主慈愍故三説其受懺人不可便答可不當先作白云大德僧聽此某甲比丘故畜若干長衣犯捨墮此衣也捨與僧是中有衆多波逸提罪令從衆僧乞懺悔若僧時到僧忍聽我某甲比丘受某甲比丘懺悔白如是作是白已方告彼云可爾懺罪人具威儀白云大德一心念我某甲故畜若干長衣犯捨墮此衣已捨與僧有衆多波逸提罪今向大德發露懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不散覆藏願大德憶我清淨戒身具足清淨布薩三説已受懺者應言自責汝心生厭離答云爾懺悔已當還衣僧中當察其財物可還不可還如野蠶綿作臥具則不可還當斫碎和泥塗壁及埵如畜長衣長鉢一月衣急施衣殘藥此五長當即座轉付還餘所犯當即座直付還即座轉付者佛言若僧衆難集此比丘有因緣欲遠行者應問此物與誰隨其所説便與與已當還僧中作白二羯磨還白云大德僧聽某甲比丘故畜若干長衣犯捨墮此衣已捨與僧若僧時到僧忍聽今持此衣與某甲比丘某甲比丘當還此某甲比丘白如是羯磨云大德僧聽某甲比丘畜若干長衣犯捨墮此衣已捨與僧僧中持此衣與某甲比丘某甲比丘當還此比丘誰諸長老忍僧持此衣與某甲比丘某甲比丘當還此比丘者默然誰不忍者説僧已忍持此衣與某甲比丘某甲比丘當還某甲比丘竟僧忍默然故是事如是持即座直付者若所犯非前五長者當依此法付又或是前五長而無因緣欲遠行者得延至明日亦依此法付僧中作白二羯磨白云大德僧聽某甲比丘故離衣僧伽黎宿犯捨墮此衣已捨與僧若僧時到僧忍聽今持此衣還某甲比丘白如是次羯磨文倣上可知四人已下對首捨衣法當具威儀白云諸大德聽我甲某比丘故畜若干長衣犯捨墮我今捨與諸大德作是捨已請懺悔主文如前受懺人應問餘比丘言三長老若三長老聽我受某甲比丘懺悔者我當受答言可爾受懺人轉告比丘言可爾懺罪文如前還衣用直付白云諸大德聽彼某甲比丘故畜若干長衣犯捨墮此衣已捨與諸大德今諸大德聽我持此衣還某甲比丘者我當還答云可爾對一人捨衣法具威儀白云大德一心念我某甲比丘故畜若干長衣犯捨墮今持捨與大德作是捨已請懺悔主文如前正懺悔法白云大德一心念我某甲比丘故畜若干長衣犯捨墮此衣已捨與大德有衆多波逸提罪今向大德發露懺悔不敢覆藏餘詞如前還衣直付無白詞懺小罪法佛言若犯僧殘乃至突吉羅知而覆藏應先教作突吉羅懺悔今按捨墮具足八品突吉羅罪初根本二品謂著捨墮衣及説戒時審問不發露次從生六品初二品謂覆波逸提經一夜二夜已去次二品謂覆藏著捨墮衣經一夜二夜已去後二品謂覆藏説戒審問不發露經一夜二夜已去合根本從生共八品今先懺從生六小罪具威儀對懺悔主云大德一心念我某甲比丘故畜若干長衣犯衆多波逸提罪經夜覆藏隨夜展轉覆藏并著用捨墮衣突吉羅罪經夜覆藏隨夜展轉覆藏經僧説戒默妄語突吉羅罪經夜覆藏隨夜展轉覆藏並犯突吉羅不憶數今向大德發露懺悔更不敢作願大德憶我餘詞同前次懺根本二小罪具威儀白懺悔主云大德一心念我某甲比丘犯著不淨衣經説戒默妄語並犯突吉羅罪各不憶數今向大德發露懺悔更不敢作願大德憶我餘詞同前懺單波逸提法此法無財物可捨但乞懺悔請懺悔主及正懺悔三法文大同尼薩耆但事有不同隨事改稱而已若小罪八品可自量度或有犯即同前懺但改罪名相為異也懺波羅提提舍尼法請一人為懺悔主請語同前但改罪名次正懺悔具威儀白云大德一心念我某甲有某事犯波羅提提舍尼罪不憶數大德我犯可呵法所不應為今向大德悔過受懺人應云汝見罪不答云見應呵云慎莫便作答云頂戴奉持懺突吉羅法佛言若故作者犯應懺突吉羅以犯非威儀突吉羅若不故作者但犯突吉羅故作者先具威儀請懺悔主云大德一心念我某甲比丘請大德為突吉羅懺悔主願大德為我作突吉羅懺悔主慈愍故三請已應懺悔其中從生根本亦須詳察種相多少方對懺悔主云大德一心念我某甲故不齊整著僧伽黎犯突吉羅不憶數今向大德發露懺悔更不敢作願大德憶我餘詞同前若誤作者應具威儀心生慚愧口言我某甲比丘誤犯不齊整著僧伽黎犯突吉羅罪我今日責心悔過一説即止此上六種通名六聚若不開出偷蘭遮止名五篇若于突吉羅中開為惡作惡説即名七聚從言上犯者謂之惡説從身上犯者謂之惡作懺悔之法律中詳明依而行之但滅犯戒罪故智論云戒律中雖復微細懺則清淨但犯十善戒雖懺而三惡道不除如犯諸性戒等須知當依大乘懺悔之法其法大略有二一事懺如梵網經云晝夜六時誦十重四十八輕戒苦到禮三世諸佛又如法華大悲等懺法精誠修之決能滅罪二理懺如涅槃經云若有修習身戒心慧能觀諸法猶如虗空設作惡業思惟觀察能轉地獄重報現世輕受若于小罪不能自出心初無懺不能習善覆藏瑕疵雖有善業為罪垢污現世輕報轉為地獄極重惡果是為愚癡若犯四重五逆謗法名為破戒有因緣故則可拔濟若披法服常懷慚愧生護法心建立正法我説是人不名破戒成實論云有我心者則業煩惱集若無我者則諸業不能得報以不具故華嚴經云譬如幻師能幻人目諸業如是名清淨真實悔過前事懺但能伏業後理懺直能斷業事理雙修則如車兩輪無遠弗屆可出苦海可詣覺場豈但滅罪而已哉
