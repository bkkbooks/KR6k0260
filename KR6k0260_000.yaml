body:
  text: 律學發軔序丙戌之冬余作戒本約義終客有以律學揭要請益者余閲之大都目不見律而襲取他書乃水潦鶴之徒所輯也因為作律學發軔以示之言發軔者示慎始也夫萬里之行起於跬步跬步一錯萬里徒勞故初學之士不可不慎若夫誤信非人誤習謬説將有終身而不知其非歷世而傳以為是者其貽害可勝道哉今之所輯姑示諸戒之大端使後學知所向方雖未極其廣大精微之致然即是而求之則所謂廣大精微者固不出此正如出門膏車先端塗轍將無遠之弗屆矣故是書雖眇所關甚大余所以不避委瑣之誚以成之若夫高明之士自當博閲全律何是書之足云時丙戌冬佛成道日永覺老人自題律學發軔目録卷上律部緣起三皈依五戒八關齋優婆塞戒沙彌戒式叉摩那戒比丘戒比丘尼戒菩薩戒卷中結界布薩説欲安居自恣受藥分亡僧物六聚懺法卷下資具日用軌則受戒辨誤律家法數目録終
